name: "Nightly sweep: comparison engine vs reachability oracle"

# The question this workflow answers nightly: does the causal-comparison
# engine ever disagree with brute-force ground truth on a randomly generated
# DAG?
#
# C2 (concurrency phase 2, workstream C item 2). Terminology: an "oracle" is
# the testing term of art for an independent source of expected answers, not
# a runner. Here the oracle is a brute-force reachability computation over a
# generated DAG's true parent map; the property test
# (core/src/event_dag/tests.rs, randomized_dags_match_reachability_oracle)
# generates random DAGs and random clocks and checks the comparison engine's
# verdict against that ground truth. The test runs a few hundred seeds on
# every normal `cargo test`; this workflow runs the same test at 100k+ seeds
# so schedules nobody hand-wrote get a chance to surface a divergence between
# the engine and the oracle. On failure the run's output (containing the
# self-contained ORACLEFAIL line: dag_seed, verdicts, and the exact
# single-seed command to reproduce) is uploaded as an artifact.
#
# GitHub only fires `schedule` triggers from the default branch, so the cron
# below activates when this file lands on `main`. `workflow_dispatch` works
# on any branch for manual runs in the meantime.

on:
  schedule:
    # 03:17 UTC daily. Off-the-hour to avoid the top-of-hour thundering herd
    # on shared runners. Dormant until this file is on the default branch;
    # see the note above.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      oracle_seeds:
        description: "Number of dag_seed values to run (ORACLE_SEEDS)"
        required: false
        default: "100000"
      oracle_seed_base:
        description: "First dag_seed value to run (ORACLE_SEED_BASE)"
        required: false
        default: "1"
      gen_oracle_seeds:
        description: "Gen-corruption immunity arm: dag_seed count (GEN_ORACLE_SEEDS; each seed runs a baseline plus the full two-channel corruption matrix per pair)"
        required: false
        default: "25000"
      gen_oracle_large_seeds:
        description: "Gen-corruption immunity arm: larger-DAG (20..=40 events) seed count (GEN_ORACLE_LARGE_SEEDS)"
        required: false
        default: "2000"
      gen_oracle_wide_seeds:
        description: "Gen-corruption immunity arm: wide-frontier (full-current-tip joins, 24..=48 events) seed count (GEN_ORACLE_WIDE_SEEDS)"
        required: false
        default: "1000"
      shape_entities:
        description: "Event-DAG-shape tier: entities in the N-entity churn shape (SHAPE_ENTITIES)"
        required: false
        default: "5000"
      shape_depth:
        description: "Event-DAG-shape tier: chain depth for the deep-history shape (SHAPE_DEPTH)"
        required: false
        default: "5000"
      shape_antichain:
        description: "Event-DAG-shape tier: concurrent writers in the wide-antichain shape (SHAPE_ANTICHAIN)"
        required: false
        default: "512"
      shape_queries:
        description: "Event-DAG-shape tier: live queries in the subscription fan-out shape (SHAPE_QUERIES)"
        required: false
        default: "128"
      shape_seeds:
        description: "Event-DAG-shape tier: seeds per scenario (SHAPE_SEEDS)"
        required: false
        default: "20"

jobs:
  oracle-scale-out:
    name: Comparison oracle (high-seed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run the comparison property oracle at high seed count
        id: oracle
        run: |
          set -o pipefail
          ORACLE_SEEDS="${{ github.event.inputs.oracle_seeds || '100000' }}" \
          ORACLE_SEED_BASE="${{ github.event.inputs.oracle_seed_base || '1' }}" \
            cargo test -p ankurah-core --lib \
              event_dag::tests::comparison_property::randomized_dags_match_reachability_oracle \
              -- --nocapture 2>&1 | tee oracle-output.log
        env:
          RUST_BACKTRACE: 1

      - name: Upload failure output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-failure-output
          path: oracle-output.log
          if-no-files-found: warn
          retention-days: 30

  # The D2 M5 gen-corruption immunity arm at nightly scale: the same
  # two-channel corruption matrix the normal test job runs at 300 seeds
  # (core/src/event_dag/tests.rs, gen_corruption_immunity), driven to 25k
  # seeds of randomized corpora plus 2k larger-DAG (20..=40 event) seeds
  # plus 1k wide-frontier seeds (full-current-tip joins, 24..=48 events;
  # the corpus class the M5 edge-check memory defect hid in).
  # Every corrupted run must be BOUND-identical to its honest baseline
  # (verdict, meet, immediate children, chain core, layer partition); ANY
  # divergence is a suppress-only discipline breach and the uploaded
  # ORACLEFAIL line (kind=gen_corruption, dag_seed, shape,
  # corruption_seed, doctored triples, single-seed repro) is the
  # stop-and-report artifact. Dedicated knobs so this arm scales
  # independently of the plain oracle (each immunity seed costs roughly
  # 8x a plain-oracle seed: a baseline plus the corruption matrix).
  gen-corruption-immunity:
    name: Gen-corruption immunity oracle (high-seed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run the immunity matrix at high seed count
        run: |
          set -o pipefail
          GEN_ORACLE_SEEDS="${{ github.event.inputs.gen_oracle_seeds || '25000' }}" \
          GEN_ORACLE_LARGE_SEEDS="${{ github.event.inputs.gen_oracle_large_seeds || '2000' }}" \
          GEN_ORACLE_WIDE_SEEDS="${{ github.event.inputs.gen_oracle_wide_seeds || '1000' }}" \
          GEN_ORACLE_SEED_BASE="${{ github.event.inputs.oracle_seed_base || '1' }}" \
            cargo test -p ankurah-core --lib \
              event_dag::tests::gen_corruption_immunity \
              -- --nocapture 2>&1 | tee gen-immunity-output.log
        env:
          RUST_BACKTRACE: 1

      - name: Upload failure output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gen-immunity-failure-output
          path: gen-immunity-output.log
          if-no-files-found: warn
          retention-days: 30

  # The C1 simulation swarm at nightly scale: the same swarm_* scenarios the
  # normal test job runs at their default 500 seeds, driven to 100k seeds of
  # fault schedules (reorder/delay/dup/drop/partition subsets per seed).
  # Activated 2026-07-06 after PR #278 (C1 harness) merged; SIMFAIL lines in
  # the log are self-contained repro commands.
  sim-swarm-nightly:
    name: Simulation swarm (high-seed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run the simulation swarm at high seed count
        run: |
          set -o pipefail
          SIM_SEEDS="${{ github.event.inputs.oracle_seeds || '100000' }}" \
            cargo test -p ankurah-tests --test sim_swarm -- --ignored --nocapture 2>&1 | tee sim-swarm-output.log
        env:
          RUST_BACKTRACE: 1

      - name: Upload failure output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sim-swarm-failure-output
          path: sim-swarm-output.log
          if-no-files-found: warn
          retention-days: 30

  # The E-shapes event-DAG-shape scale tier at nightly scale: the same four
  # shape scenarios the normal test job runs at small defaults (N-entity churn,
  # deep single-entity history, wide concurrent antichain, subscription
  # fan-out), driven up via the SHAPE_* env knobs and the `--ignored` nightly
  # variants. Each scenario asserts the C1 convergence invariants at
  # event-DAG-shape scale and a loose order-of-magnitude peak memory bound
  # (counting global allocator). A SHAPEMEM bound breach or an invariant
  # violation fails the job; the SHAPEMEM lines in the log are the per-scenario
  # peak-memory record. This is the deterministic event-DAG-shape instrument
  # only; wall-clock perf numbers come from the criterion per-lane suite, which
  # is advisory and NOT run here.
  event-dag-shapes-nightly:
    name: Event-DAG-shape scale tier (env-scaled)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run the event-DAG-shape scale tier at scale
        run: |
          set -o pipefail
          SHAPE_ENTITIES="${{ github.event.inputs.shape_entities || '5000' }}" \
          SHAPE_DEPTH="${{ github.event.inputs.shape_depth || '5000' }}" \
          SHAPE_ANTICHAIN="${{ github.event.inputs.shape_antichain || '512' }}" \
          SHAPE_QUERIES="${{ github.event.inputs.shape_queries || '128' }}" \
          SHAPE_SEEDS="${{ github.event.inputs.shape_seeds || '20' }}" \
            cargo test -p ankurah-tests --test sim_event_dag_shapes -- --ignored --nocapture 2>&1 | tee event-dag-shapes-output.log
        env:
          RUST_BACKTRACE: 1

      - name: Upload failure output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: event-dag-shapes-failure-output
          path: event-dag-shapes-output.log
          if-no-files-found: warn
          retention-days: 30
