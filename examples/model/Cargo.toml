[package]
name    = "example-model"
version = "0.1.0"
edition = "2021"
publish = false

[features]
default = ["wasm"]
wasm    = ["dep:wasm-bindgen", "ankurah/wasm", "ankurah/react"]

[dependencies]
ankurah      = { path = "../../ankurah", features = ["derive"], version = "^0.1.5" }
serde        = { version = "1.0", features = ["derive"] }
wasm-bindgen = { version = "0.2", optional = true }
reactive_graph = { version = "0.1.4", features = ["effects"], optional = true }

##### patch - something is wrong with the uuid crate for wasm
getrandom = { version = "0.3", features = ["wasm_js"] }
uuid      = { version = "1.7", features = ["v4", "serde", "js"] }
###### 

tracing = { version = "0.1" }